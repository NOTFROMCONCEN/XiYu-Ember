<section id="marshmallow" class="dream-pool">

        <div class="dream-item"><i class="fas fa-camera"></i></div>
        <div class="dream-item"><i class="fas fa-gift"></i></div>
        <div class="dream-item"><i class="fas fa-heart"></i></div>
        <div class="dream-item"><i class="fas fa-star"></i></div>
        <div class="dream-item"><i class="fas fa-fire"></i></div>
        <div class="dream-item"><i class="fas fa-candy-cane"></i></div>
