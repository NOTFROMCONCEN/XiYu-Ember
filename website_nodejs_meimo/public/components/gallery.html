<!--
  栖屿碎片 - V2 轮播画廊
  @author Huameitang
  一个现代化的、功能丰富的图片轮播组件
-->
<section id="gallery-v2" class="gallery-section">
    <h2 class="section-title">栖屿碎片</h2>
    <div class="carousel-container">
        <div class="carousel-track">
            <!-- Slides will be dynamically injected by JavaScript -->
        </div>
        <button class="carousel-button prev" aria-label="Previous slide">&#10094;</button>
        <button class="carousel-button next" aria-label="Next slide">&#10095;</button>
        <div class="carousel-pagination">
            <!-- Pagination dots will be dynamically injected by JavaScript -->
        </div>
    </div>
</section>
