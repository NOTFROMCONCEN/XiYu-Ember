<!DOCTYPE html>
<!--
    栖屿 Ember 轰趴馆 - 模块化主页面
    @author Huameitang
    这是网站的模块化主页面文件
    采用组件化设计，将页面拆分为多个独立的模块
    便于维护、扩展和团队协作开发
    遵循SOLID原则，保持代码的可维护性和可扩展性
-->
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栖屿 Ember | 深藏不露的轰趴馆</title>

    <!-- 外部字体和图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- 模块化CSS样式文件 -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/symbols.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/footer.css">

    <!-- 性能优化CSS文件 -->
    <link rel="stylesheet" href="css/advanced-performance.css">
</head>

<body>
    <!-- 背景效果元素 -->
    <div class="vhs-overlay"></div>
    <div class="noise"></div>
    <div class="distortion"></div>

    <!-- 头部导航组件 -->
    <div id="header-component"></div>

    <!-- 主横幅组件 -->
    <div id="hero-component"></div>

    <!-- 功能卡片组件 -->
    <div id="cards-component"></div>

    <!-- 画廊组件 -->
    <div id="gallery-component"></div>

    <!-- 符号库组件 -->
    <div id="symbols-component"></div>



    <!-- 关于区域组件 -->
    <div id="about-component"></div>

    <!-- 页脚组件 -->
    <div id="footer-component"></div>

    <!-- 悬浮按钮组件 -->
    <div id="floating-button-component"></div>

    <!-- 性能配置模块（优先加载） -->
    <script src="js/performance-config.js"></script>
    <script src="js/scroll-optimizer.js"></script>

    <!-- 模块化JavaScript文件 -->
    <script src="js/performance-monitor.js"></script>
    <script type="module" src="js/performance-optimizer.js"></script>
    <script src="js/advanced-performance-optimizer.js"></script>
    <script src="js/resource-optimizer.js"></script>
    <script src="js/smart-cache-manager.js"></script>
    <script type="module" src="js/effects.js"></script>
    <script type="module" src="js/interactions.js"></script>

    <!-- 应用启动脚本（已提取为独立文件 js/app-bootstrap.js） -->
    <script src="js/app-bootstrap.js"></script>
</body>

</html>
